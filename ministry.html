<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Media Ministry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    /* ── Video background ── */
    .video-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    /* ── Elegant warm overlay for readability ── */
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(
        135deg,
        rgba(20,50,60,0.55) 0%,
        rgba(40,80,90,0.25) 50%,
        rgba(15,45,55,0.45) 100%
      );
      z-index: -1;
    }

    /* ── Content card ── */
    .content {
      max-width: 680px;
      padding: 3rem 3.5rem;
      text-align: center;
      animation: fadeUp 1.2s ease-out both;
    }

    .content .ministry-label {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      margin-bottom: 1.25rem;
    }

    .content h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 1.5rem;
      text-shadow: 0 2px 20px rgba(20,60,80,0.4);
    }

    .content p {
      font-size: 1.15rem;
      font-weight: 300;
      line-height: 1.75;
      color: rgba(255,255,255,0.88);
      text-shadow: 0 1px 8px rgba(0,0,0,0.3);
    }

    .divider {
      width: 60px;
      height: 2px;
      background: rgba(255,255,255,0.5);
      margin: 1.5rem auto;
      border-radius: 1px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .content { padding: 2rem 1.5rem; }
      .content h1 { font-size: 1.8rem; }
      .content p { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <video class="video-bg" autoplay muted loop playsinline>
    <source src="video/hero-bg.mp4" type="video/mp4" />
  </video>
  <div class="overlay"></div>

  <div class="content">
    <div class="ministry-label">Global Media Ministry</div>
    <h1>Exploring Faith &amp; the Transformative Power of Belief</h1>
    <div class="divider"></div>
    <p>A global media ministry exploring faith, theology, and the transformative power of belief through thought-provoking teaching and conversation.</p>
  </div>

</body>
</html>
